name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple

  build-and-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump Version (.nimble)
        run: |
          VERSION=${{ needs.release-please.outputs.tag_name }}
          VERSION=${VERSION#v}

          # Force bump the version
          sed -i "s/version[[:space:]]*=[[:space:]]*\".*\"/version = \"$VERSION\"/" nsstats.nimble

          # Commit the change back to the main branch so the repo is in sync
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add nsstats.nimble
          git commit -m "chore: update nimble version to $VERSION [skip ci]"
          git push

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.10"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Release
        run: nimble release -y

      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: bin/nsstats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
